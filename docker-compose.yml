version: '3.8'

services:
  proxy:
    build:
      context: ./proxy
    ports:
      - "80:80"
    depends_on:
      - frontend
    networks:
      - bbs-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - .env
    command: npm run dev
    networks:
      - bbs-network
    # ttyを有効にしてコンテナを起動し続ける（開発環境用）
    tty: true

networks:
  bbs-network:
    driver: bridge