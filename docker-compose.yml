services:
  proxy:
    build:
      context: ./proxy
    ports:
      - "80:80"
    depends_on:
      - frontend
    networks:
      - bbs-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    env_file:
      - .env
    command: npm run dev
    networks:
      - bbs-network
    # ttyを有効にしてコンテナを起動し続ける（開発環境用）
    tty: true
    stdin_open: true   # 追加：インタラクティブな操作を可能にする

volumes:
  frontend_node_modules:
  frontend_next:
  
networks:
  bbs-network:
    driver: bridge